<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Module B Portfolio UI</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 24px; background: #f7f8fb; color: #1d2939; }
    .card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(16,24,40,0.08); }
    input, textarea, button { width: 100%; margin: 6px 0; padding: 10px; }
    button { background: #0b63f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Member Portfolio (Module B)</h1>

  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="username (admin/user)">
    <input id="password" type="password" placeholder="password (admin123/user123)">
    <button onclick="login()">Login</button>
    <pre id="auth"></pre>
  </div>

  <div class="card">
    <h3>My/Visible Portfolio Data</h3>
    <button onclick="loadPortfolios()">Load Portfolio</button>
    <pre id="portfolio"></pre>
  </div>

  <script>
    let token = "";

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user: document.getElementById('user').value,
          password: document.getElementById('password').value,
        })
      });
      const data = await res.json();
      if (data.session_token) token = data.session_token;
      document.getElementById('auth').textContent = JSON.stringify(data, null, 2);
    }

    async function loadPortfolios() {
      if (!token) {
        document.getElementById('portfolio').textContent = 'Login first.';
        return;
      }
      const res = await fetch('/api/portfolio', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      document.getElementById('portfolio').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
